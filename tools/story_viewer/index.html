<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剧情节点查看器 - 迷途抉择</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            overflow: hidden;
        }

        /* 头部 */
        header {
            background: #16213e;
            padding: 12px 20px;
            border-bottom: 2px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        header h1 {
            font-size: 18px;
            color: #e94560;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        /* 章节选择器 */
        .chapter-select {
            padding: 8px 15px;
            background: #0f3460;
            border: 1px solid #4ecca3;
            color: #eee;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
        }

        .chapter-select:hover {
            background: #1a4a7a;
        }

        /* 主布局 */
        .main-container {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* 左侧 - 节点列表 */
        .node-list-panel {
            width: 250px;
            background: #16213e;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 12px;
            background: #0f3460;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 1px solid #1a1a2e;
        }

        .search-box {
            padding: 10px;
            border-bottom: 1px solid #0f3460;
        }

        .search-box input {
            width: 100%;
            padding: 8px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            color: #eee;
            border-radius: 4px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #4ecca3;
        }

        .node-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .node-item {
            padding: 10px;
            margin-bottom: 5px;
            background: #0f3460;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .node-item:hover {
            background: #1a4a7a;
        }

        .node-item.selected {
            background: #e94560;
        }

        .node-item.ending {
            border-left: 3px solid #f39c12;
        }

        /* 中间 - 图谱区域 */
        .graph-panel {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #1a1a2e;
        }

        .graph-toolbar {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        .toolbar-btn {
            padding: 8px 15px;
            background: #0f3460;
            border: 1px solid #4ecca3;
            color: #eee;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .toolbar-btn:hover {
            background: #1a4a7a;
        }

        .toolbar-btn.active {
            background: #4ecca3;
            color: #1a1a2e;
        }

        .canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
            min-width: 1200px;
            min-height: 600px;
            overflow: auto;
            cursor: grab;
        }

        .canvas-container:active {
            cursor: grabbing;
        }

        #connectionCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            cursor: default;
        }

        #connectionsSvg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        /* 右侧 - 详情/编辑面板 */
        .detail-panel {
            width: 350px;
            background: #16213e;
            border-left: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
        }

        .detail-header {
            padding: 12px;
            background: #0f3460;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 1px solid #1a1a2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .detail-section {
            margin-bottom: 20px;
        }

        .detail-section h3 {
            font-size: 13px;
            color: #4ecca3;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #0f3460;
        }

        .detail-field {
            margin-bottom: 12px;
        }

        .detail-field label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .detail-field input,
        .detail-field textarea,
        .detail-field select {
            width: 100%;
            padding: 8px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            color: #eee;
            border-radius: 4px;
            font-size: 13px;
        }

        .detail-field textarea {
            min-height: 80px;
            resize: vertical;
        }

        .detail-field input:focus,
        .detail-field textarea:focus,
        .detail-field select:focus {
            outline: none;
            border-color: #4ecca3;
        }

        .btn-save {
            width: 100%;
            padding: 10px;
            background: #4ecca3;
            border: none;
            color: #1a1a2e;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn-save:hover {
            background: #3db892;
        }

        .btn-delete {
            width: 100%;
            padding: 10px;
            background: #e94560;
            border: none;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }

        .btn-delete:hover {
            background: #d63850;
        }

        .choice-item {
            background: #0a2647;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .btn-delete-small {
            padding: 5px 10px;
            font-size: 12px;
            background: #e94560;
            border: none;
            color: #fff;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 5px;
        }

        .btn-delete-small:hover {
            background: #d63850;
        }

        /* 视频播放弹窗 */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .video-modal.active {
            display: flex;
        }

        .video-modal-content {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            max-width: 90%;
            max-height: 90%;
        }

        .video-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .video-modal-title {
            font-size: 16px;
            color: #4ecca3;
        }

        .video-close {
            background: #e94560;
            border: none;
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .video-player {
            width: 100%;
            max-width: 800px;
            background: #000;
        }

        .video-player video {
            width: 100%;
            max-height: 500px;
        }

        .no-video {
            color: #aaa;
            text-align: center;
            padding: 40px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #0f3460;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #1a4a7a;
        }
    </style>
</head>
<body>
    <header>
        <h1>剧情节点查看器</h1>
        <div class="header-controls">
            <select class="chapter-select" id="chapterSelect">
                <option value="">加载章节...</option>
            </select>
        </div>
    </header>

    <div class="main-container">
        <!-- 左侧节点列表 -->
        <div class="node-list-panel">
            <div class="panel-header">节点列表</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索节点...">
            </div>
            <div class="node-list" id="nodeList"></div>
        </div>

        <!-- 中间图谱 -->
        <div class="graph-panel">
            <div class="graph-toolbar">
                <button class="toolbar-btn" id="editModeBtn">编辑模式</button>
                <button class="toolbar-btn" id="addNodeBtn">+ 添加节点</button>
            </div>
            <div class="canvas-container">
                <svg id="connectionsSvg"></svg>
                <canvas id="connectionCanvas"></canvas>
            </div>
        </div>

        <!-- 右侧详情 -->
        <div class="detail-panel">
            <div class="detail-header">
                <span id="detailTitle">节点详情</span>
            </div>
            <div class="detail-content" id="detailContent">
                <div class="empty-state">选择一个节点查看详情</div>
            </div>
        </div>
    </div>

    <!-- 视频播放弹窗 -->
    <div class="video-modal" id="videoModal">
        <div class="video-modal-content">
            <div class="video-modal-header">
                <span class="video-modal-title" id="videoTitle">视频播放</span>
                <button class="video-close" id="videoClose">关闭</button>
            </div>
            <div class="video-player" id="videoPlayer">
                <div class="no-video">该节点没有视频</div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let chapterData = null;
        let nodes = {};
        let nodePositions = {};
        let nodeLevels = {};
        let selectedNodeId = null;
        let isEditMode = false;

        // 画布
        let canvas, ctx;

        // 预定义位置
        const nodePositionsData = {
            "ch1_sc_001": {x: 30, y: 278},
            "ch1_sc_002a": {x: 160, y: 233},
            "ch1_sc_002b": {x: 160, y: 278},
            "ch1_sc_002c": {x: 160, y: 323},
            "ch1_sc_003": {x: 290, y: 278},
            "ch1_sc_004": {x: 420, y: 278},
            "ch1_sc_007": {x: 550, y: 233},
            "ch1_sc_005": {x: 550, y: 278},
            "ch1_sc_006": {x: 550, y: 323},
            "ch1_sc_007b": {x: 680, y: 233},
            "ch1_sc_005b": {x: 680, y: 278},
            "ch1_sc_006b": {x: 680, y: 323},
            "ch1_sc_008": {x: 810, y: 278},
            "ch1_ending_01": {x: 940, y: 188},
            "ch1_ending_02": {x: 940, y: 233},
            "ch1_ending_03": {x: 940, y: 278},
            "ch1_ending_04": {x: 940, y: 323},
            "ch1_ending_05": {x: 940, y: 368}
        };

        const nodeLevelsData = {
            "ch1_sc_001": 0,
            "ch1_sc_002a": 1, "ch1_sc_002b": 1, "ch1_sc_002c": 1,
            "ch1_sc_003": 2,
            "ch1_sc_004": 3,
            "ch1_sc_005": 4, "ch1_sc_006": 4, "ch1_sc_007": 4,
            "ch1_sc_005b": 5, "ch1_sc_006b": 5, "ch1_sc_007b": 5,
            "ch1_sc_008": 6,
            "ch1_ending_01": 7, "ch1_ending_02": 7, "ch1_ending_03": 7,
            "ch1_ending_04": 7, "ch1_ending_05": 7
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            initCanvas();
            await loadChapterList();
            setupEventListeners();
        });

        function initCanvas() {
            canvas = document.getElementById('connectionCanvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
        }

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = Math.max(container.clientWidth, 1200);
            canvas.height = Math.max(container.clientHeight, 600);
        }

        // 垂直居中布局
        function applyVerticalCentering() {
            if (!canvas) return;

            const centerY = canvas.height / 2;

            // 按层级分组节点
            const levels = {};
            Object.entries(nodePositions).forEach(([id, pos]) => {
                const level = nodeLevelsData[id] || 0;
                if (!levels[level]) levels[level] = [];
                levels[level].push({id, pos});
            });

            // 计算总体偏移，使所有层级居中
            const levelCount = Object.keys(levels).length;
            if (levelCount === 0) return;

            // 找出所有节点的中心y坐标
            let totalY = 0;
            let count = 0;
            Object.values(levels).forEach(nodesAtLevel => {
                nodesAtLevel.forEach(({pos}) => {
                    totalY += pos.y;
                    count++;
                });
            });

            if (count === 0) return;

            const currentCenter = totalY / count;
            const offsetY = centerY - currentCenter;

            // 应用偏移
            Object.keys(nodePositions).forEach(id => {
                nodePositions[id].y += offsetY;
            });
        }

        // 加载章节列表
        async function loadChapterList() {
            try {
                const response = await fetch('../../lost-choices/data/stories/chapters_index.json');
                const data = await response.json();

                const select = document.getElementById('chapterSelect');
                select.innerHTML = '<option value="">选择章节...</option>';

                data.chapters.forEach(chapter => {
                    const option = document.createElement('option');
                    option.value = chapter.id;
                    option.textContent = `${chapter.title} - ${chapter.description}`;
                    select.appendChild(option);
                });
            } catch (e) {
                console.error('加载章节列表失败:', e);
            }
        }

        // 加载章节数据
        async function loadChapter(chapterId) {
            try {
                const response = await fetch(`../../lost-choices/data/stories/${chapterId}_hybrid.json`);
                chapterData = await response.json();
                nodes = chapterData.nodes || {};

                // 使用预定义位置，或根据节点生成
                nodePositions = {};
                Object.keys(nodes).forEach(id => {
                    if (nodePositionsData[id]) {
                        nodePositions[id] = {...nodePositionsData[id]};
                    } else {
                        // 新节点使用默认位置（画布中央）
                        nodePositions[id] = {x: canvas.width / 2, y: canvas.height / 2};
                    }
                });

                // 垂直居中调整
                applyVerticalCentering();

                nodeLevels = nodeLevelsData;

                renderNodeList();
                drawConnectionGraph();
            } catch (e) {
                console.error('加载章节失败:', e);
            }
        }

        // 渲染节点列表
        function renderNodeList() {
            const list = document.getElementById('nodeList');
            list.innerHTML = '';

            Object.entries(nodes).forEach(([id, node]) => {
                const item = document.createElement('div');
                item.className = 'node-item' + (node.node_type === 'ending' ? ' ending' : '');
                if (id === selectedNodeId) item.classList.add('selected');
                item.textContent = id;
                item.onclick = () => selectNode(id);
                list.appendChild(item);
            });
        }

        // 搜索节点
        function filterNodes(searchText) {
            const items = document.querySelectorAll('.node-item');
            items.forEach(item => {
                const text = item.textContent.toLowerCase();
                item.style.display = text.includes(searchText.toLowerCase()) ? 'block' : 'none';
            });
        }

        // 选择节点
        function selectNode(id) {
            selectedNodeId = id;
            renderNodeList();
            drawConnectionGraph();
            renderDetailPanel(id);
        }

        // 渲染详情面板
        function renderDetailPanel(id) {
            const node = nodes[id];
            if (!node) return;

            const title = document.getElementById('detailTitle');
            const content = document.getElementById('detailContent');

            title.textContent = id;

            const isEnding = node.node_type === 'ending';

            let html = `
                <div class="detail-section">
                    <h3>基本信息</h3>
                    <div class="detail-field">
                        <label>节点ID</label>
                        <input type="text" id="editNodeId" value="${id}" ${!isEditMode ? 'readonly' : ''}>
                    </div>
                    <div class="detail-field">
                        <label>节点类型</label>
                        <select id="editNodeType" ${!isEditMode ? 'disabled' : ''}>
                            <option value="story" ${node.node_type === 'story' ? 'selected' : ''}>剧情节点</option>
                            <option value="ending" ${node.node_type === 'ending' ? 'selected' : ''}>结局节点</option>
                            <option value="choice" ${node.node_type === 'choice' ? 'selected' : ''}>选择节点</option>
                        </select>
                    </div>
                    <div class="detail-field">
                        <label>标题</label>
                        <input type="text" id="editTitle" value="${node.title || ''}" ${!isEditMode ? 'readonly' : ''}>
                    </div>
                    <div class="detail-field">
                        <label>位置 (X, Y)</label>
                        <div style="display:flex;gap:5px;">
                            <input type="number" id="editPosX" value="${nodePositions[id] ? Math.round(nodePositions[id].x) : 0}" ${!isEditMode ? 'readonly' : ''} style="width:60px;">
                            <input type="number" id="editPosY" value="${nodePositions[id] ? Math.round(nodePositions[id].y) : 0}" ${!isEditMode ? 'readonly' : ''} style="width:60px;">
                        </div>
                    </div>
                </div>

                <div class="detail-section">
                    <h3>视觉资产</h3>
                    <div class="detail-field">
                        <label>关键帧图片</label>
                        <input type="text" id="editKeyframe" value="${node.keyframe || ''}" ${!isEditMode ? 'readonly' : ''}>
                    </div>
                    <div class="detail-field">
                        <label>视频路径</label>
                        <input type="text" id="editVideo" value="${typeof node.video === 'object' ? (node.video.path || '') : (node.video || '')}" ${!isEditMode ? 'readonly' : ''}>
                    </div>
                    ${node.video ? `<button class="toolbar-btn" onclick="playVideo('${id}')" style="width:100%;margin-top:5px;">播放视频</button>` : ''}
                </div>

                ${!isEnding ? `
                <div class="detail-section">
                    <h3>选项</h3>
                    ${node.choices && node.choices.length > 0 ? node.choices.map((choice, i) => `
                        <div class="choice-item">
                            <div class="detail-field">
                                <label>选项 ${i + 1} 文本</label>
                                <input type="text" value="${choice.text || ''}" ${!isEditMode ? 'readonly' : ''} data-choice-index="${i}" data-choice-field="text">
                            </div>
                            <div class="detail-field">
                                <label>目标节点</label>
                                <input type="text" value="${choice.next_node || ''}" ${!isEditMode ? 'readonly' : ''} data-choice-index="${i}" data-choice-field="next_node">
                            </div>
                            ${isEditMode ? `<button class="btn-small btn-delete-small" onclick="removeChoice(${i})">删除</button>` : ''}
                        </div>
                    `).join('') : '<div class="detail-field"><span style="color:#aaa">无选项</span></div>'}
                    ${isEditMode ? `<button class="toolbar-btn" onclick="addChoice()" style="width:100%;margin-top:5px;">+ 添加选项</button>` : ''}
                </div>
                ` : ''}

                ${node.description ? `
                <div class="detail-section">
                    <h3>描述</h3>
                    <p style="color:#aaa;font-size:13px;">${node.description}</p>
                </div>
                ` : ''}
            `;

            if (isEditMode) {
                html += `
                    <button class="btn-save" onclick="saveNode('${id}')">保存修改</button>
                    <button class="btn-delete" onclick="deleteNode('${id}')">删除节点</button>
                `;
            }

            content.innerHTML = html;
        }

        // 播放视频
        function playVideo(nodeId) {
            const node = nodes[nodeId];
            if (!node || !node.video) return;

            const modal = document.getElementById('videoModal');
            const player = document.getElementById('videoPlayer');
            const title = document.getElementById('videoTitle');

            title.textContent = `${nodeId} - 视频播放`;

            // 处理 video 可能是对象或字符串的情况
            let videoPath = node.video;
            if (typeof videoPath === 'object' && videoPath.path) {
                videoPath = videoPath.path;
            }

            if (typeof videoPath !== 'string') {
                player.innerHTML = '<div class="no-video">视频路径格式不正确</div>';
                modal.classList.add('active');
                return;
            }

            // 转换 Godot 路径为实际 HTTP 路径
            // res://assets/videos/ch1/sc_001/key_001.mp4 -> /lost-choices/assets/videos/ch1/sc_001/key_001.mp4
            let httpPath = videoPath.replace('res://assets/videos/', '/lost-choices/assets/videos/');

            player.innerHTML = `
                <video controls autoplay>
                    <source src="${httpPath}" type="video/mp4">
                    <source src="${httpPath.replace ? httpPath.replace('.mp4', '.webm') : httpPath}" type="video/webm">
                    <source src="${httpPath.replace ? httpPath.replace('.mp4', '.ogv') : httpPath}" type="video/ogv">
                    您的浏览器不支持视频播放
                </video>
            `;

            modal.classList.add('active');
        }

        // 关闭视频
        document.getElementById('videoClose').onclick = () => {
            document.getElementById('videoModal').classList.remove('active');
            document.getElementById('videoPlayer').innerHTML = '<div class="no-video">该节点没有视频</div>';
        };

        // 保存节点
        function saveNode(oldId) {
            const newId = document.getElementById('editNodeId').value;
            const nodeType = document.getElementById('editNodeType').value;
            const title = document.getElementById('editTitle').value;
            const keyframe = document.getElementById('editKeyframe').value;
            const video = document.getElementById('editVideo').value;

            // 更新节点数据
            const node = nodes[oldId];
            node.node_type = nodeType;
            node.title = title;
            node.keyframe = keyframe;
            node.video = video;

            // 保存选项数据
            const choiceInputs = document.querySelectorAll('[data-choice-index]');
            if (choiceInputs.length > 0) {
                // 按索引分组
                const choicesMap = {};
                choiceInputs.forEach(input => {
                    const index = parseInt(input.dataset.choiceIndex);
                    const field = input.dataset.choiceField;
                    if (!choicesMap[index]) choicesMap[index] = {};
                    choicesMap[index][field] = input.value;
                });
                // 转换为数组
                const newChoices = Object.entries(choicesMap).map(([index, choice]) => ({
                    text: choice.text || '',
                    next_node: choice.next_node || ''
                }));
                node.choices = newChoices;
            }

            // 如果ID改变了
            if (newId !== oldId) {
                nodes[newId] = node;
                delete nodes[oldId];
                nodePositions[newId] = nodePositions[oldId] || {x: 100, y: 100};
                delete nodePositions[oldId];
                selectedNodeId = newId;
            }

            // 保存位置
            const posX = parseInt(document.getElementById('editPosX').value) || 100;
            const posY = parseInt(document.getElementById('editPosY').value) || 100;
            nodePositions[selectedNodeId] = {x: posX, y: posY};

            renderNodeList();
            drawConnectionGraph();
            renderDetailPanel(selectedNodeId);
            alert('保存成功！');
        }

        // 添加选项
        function addChoice() {
            const node = nodes[selectedNodeId];
            if (!node) return;
            if (!node.choices) node.choices = [];
            node.choices.push({text: '新选项', next_node: ''});
            renderDetailPanel(selectedNodeId);
        }

        // 删除选项
        function removeChoice(index) {
            const node = nodes[selectedNodeId];
            if (!node || !node.choices) return;
            node.choices.splice(index, 1);
            renderDetailPanel(selectedNodeId);
        }

        // 删除节点
        function deleteNode(id) {
            if (!confirm(`确定要删除节点 ${id} 吗？`)) return;

            // 移除指向该节点的连线
            Object.values(nodes).forEach(node => {
                if (node.choices) {
                    node.choices = node.choices.filter(c => c.next_node !== id);
                }
            });

            delete nodes[id];
            delete nodePositions[id];

            if (selectedNodeId === id) {
                selectedNodeId = null;
                document.getElementById('detailContent').innerHTML = '<div class="empty-state">选择一个节点查看详情</div>';
            }

            renderNodeList();
            drawConnectionGraph();
        }

        // 添加新节点
        function addNode() {
            const newId = `new_node_${Date.now()}`;
            nodes[newId] = {
                node_type: 'story',
                title: '新节点',
                choices: []
            };
            nodePositions[newId] = {x: 200, y: 200};

            renderNodeList();
            selectNode(newId);
        }

        // 绘制图谱
        function drawConnectionGraph() {
            if (!ctx) return;

            const width = canvas.width;
            const height = canvas.height;

            // 清空画布
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, width, height);

            // 绘制节点
            drawNodes();

            // 绘制连线
            drawConnections();
        }

        function drawNodes() {
            const nodeW = 80;
            const nodeH = 30;

            Object.entries(nodePositions).forEach(([id, pos]) => {
                const node = nodes[id];
                if (!node) return;

                const isSelected = id === selectedNodeId;
                const isEnding = node.node_type === 'ending';

                // 节点矩形
                ctx.fillStyle = isEnding ? '#f39c12' : (isSelected ? '#e94560' : '#0f3460');
                ctx.strokeStyle = isSelected ? '#4ecca3' : '#16213e';
                ctx.lineWidth = 2;

                roundRect(ctx, pos.x - nodeW/2, pos.y - nodeH/2, nodeW, nodeH, 5);
                ctx.fill();
                ctx.stroke();

                // 节点文字
                ctx.fillStyle = '#eee';
                ctx.font = '9px Microsoft YaHei';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(id, pos.x, pos.y);
            });
        }

        function drawConnections() {
            const svg = document.getElementById('connectionsSvg');
            if (!svg) return;

            svg.innerHTML = '';

            const nodeW = 80;

            // 添加箭头定义
            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            defs.innerHTML = `
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" />
                </marker>
            `;
            svg.appendChild(defs);

            Object.entries(nodes).forEach(([id, node]) => {
                if (!node.choices) return;

                const from = nodePositions[id];
                if (!from) return;

                const fromLevel = nodeLevels[id] || 0;

                node.choices.forEach(choice => {
                    const to = nodePositions[choice.next_node];
                    if (!to) return;

                    const toLevel = nodeLevels[choice.next_node] || 0;

                    // 只绘制到下一层的连线
                    if (toLevel !== fromLevel + 1) return;

                    const startX = from.x + nodeW / 2;
                    const endX = to.x - nodeW / 2;

                    // 贝塞尔曲线
                    const pathD = `M ${startX} ${from.y} C ${(startX + endX) / 2} ${from.y}, ${(startX + endX) / 2} ${to.y}, ${endX} ${to.y}`;

                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', pathD);
                    path.setAttribute('stroke', '#ffffff');
                    path.setAttribute('stroke-width', '1');
                    path.setAttribute('fill', 'none');
                    path.setAttribute('marker-end', 'url(#arrowhead)');
                    svg.appendChild(path);
                });
            });
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // 拖拽状态
        let isDragging = false;
        let dragNodeId = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;

        // 画布平移状态
        let isPanning = false;
        let panStartX = 0;
        let panStartY = 0;
        let panScrollLeft = 0;
        let panScrollTop = 0;

        // 事件监听
        function setupEventListeners() {
            // 章节选择
            document.getElementById('chapterSelect').onchange = (e) => {
                if (e.target.value) {
                    loadChapter(e.target.value);
                }
            };

            // 搜索
            document.getElementById('searchInput').oninput = (e) => {
                filterNodes(e.target.value);
            };

            // 画布鼠标按下 - 开始拖拽
            canvas.addEventListener('mousedown', (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                // 检查点击了哪个节点
                for (const [id, pos] of Object.entries(nodePositions)) {
                    if (x >= pos.x - 40 && x <= pos.x + 40 &&
                        y >= pos.y - 15 && y <= pos.y + 15) {
                        isDragging = true;
                        dragNodeId = id;
                        dragOffsetX = x - pos.x;
                        dragOffsetY = y - pos.y;
                        selectNode(id);
                        e.stopPropagation();
                        return;
                    }
                }
            });

            // 画布鼠标移动 - 拖拽中
            canvas.addEventListener('mousemove', (e) => {
                if (!isDragging || !dragNodeId) return;

                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                nodePositions[dragNodeId] = {
                    x: x - dragOffsetX,
                    y: y - dragOffsetY
                };
                drawConnectionGraph();
            });

            // 画布鼠标松开 - 结束拖拽
            canvas.addEventListener('mouseup', () => {
                isDragging = false;
                dragNodeId = null;
            });

            // 画布鼠标离开 - 结束拖拽
            canvas.addEventListener('mouseleave', () => {
                isDragging = false;
                dragNodeId = null;
            });

            // 编辑模式
            document.getElementById('editModeBtn').onclick = () => {
                isEditMode = !isEditMode;
                document.getElementById('editModeBtn').classList.toggle('active', isEditMode);
                if (selectedNodeId) {
                    renderDetailPanel(selectedNodeId);
                }
            };

            // 添加节点
            document.getElementById('addNodeBtn').onclick = () => {
                addNode();
                // 新节点添加后自动进入编辑模式
                if (!isEditMode) {
                    isEditMode = true;
                    document.getElementById('editModeBtn').classList.add('active');
                }
            };

            // 画布容器平移（拖拽空白区域移动视图）
            const canvasContainer = document.querySelector('.canvas-container');
            canvasContainer.addEventListener('mousedown', (e) => {
                // 检查点击是否在 canvas 上
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                // 检查是否点击了节点
                let clickedOnNode = false;
                for (const [id, pos] of Object.entries(nodePositions)) {
                    if (x >= pos.x - 40 && x <= pos.x + 40 &&
                        y >= pos.y - 15 && y <= pos.y + 15) {
                        clickedOnNode = true;
                        break;
                    }
                }

                // 如果没有点击节点，则开始平移
                if (!clickedOnNode) {
                    isPanning = true;
                    panStartX = e.clientX;
                    panStartY = e.clientY;
                    panScrollLeft = canvasContainer.scrollLeft;
                    panScrollTop = canvasContainer.scrollTop;
                    canvasContainer.style.cursor = 'grabbing';
                    e.preventDefault();
                }
            });

            // 鼠标移动 - 平移
            canvasContainer.addEventListener('mousemove', (e) => {
                if (!isPanning) return;

                const dx = e.clientX - panStartX;
                const dy = e.clientY - panStartY;
                canvasContainer.scrollLeft = panScrollLeft - dx;
                canvasContainer.scrollTop = panScrollTop - dy;
            });

            // 鼠标松开
            canvasContainer.addEventListener('mouseup', () => {
                isPanning = false;
                canvasContainer.style.cursor = 'grab';
            });

            // 鼠标离开
            canvasContainer.addEventListener('mouseleave', () => {
                isPanning = false;
                canvasContainer.style.cursor = 'grab';
            });

            // 窗口大小变化
            window.onresize = () => {
                resizeCanvas();
                drawConnectionGraph();
            };
        }
    </script>
</body>
</html>
