<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剧情节点查看器 - 迷途抉择</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            overflow: hidden;
        }

        /* 头部 */
        header {
            background: #16213e;
            padding: 15px 20px;
            border-bottom: 2px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 20px;
            color: #e94560;
        }

        .header-info {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .header-info span {
            color: #aaa;
        }

        .header-info strong {
            color: #4ecca3;
        }

        /* 主体布局 */
        .main-container {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* 左侧节点列表 */
        .node-list {
            width: 350px;
            background: #16213e;
            border-right: 2px solid #0f3460;
            display: flex;
            flex-direction: column;
        }

        .list-header {
            padding: 15px;
            background: #0f3460;
            border-bottom: 1px solid #1a1a2e;
        }

        .list-header h2 {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .search-box {
            width: 100%;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            background: #1a1a2e;
            color: #eee;
            font-size: 14px;
        }

        .search-box:focus {
            outline: 2px solid #e94560;
        }

        .filter-buttons {
            display: flex;
            gap: 5px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 4px 10px;
            border: none;
            border-radius: 3px;
            background: #1a1a2e;
            color: #aaa;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: #e94560;
            color: white;
        }

        .node-items {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .node-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #1a1a2e;
            border-radius: 6px;
            cursor: pointer;
            border-left: 3px solid #4ecca3;
            transition: all 0.2s;
        }

        .node-item:hover {
            background: #0f3460;
            transform: translateX(3px);
        }

        .node-item.selected {
            background: #0f3460;
            border-left-color: #e94560;
        }

        .node-item.ending {
            border-left-color: #f39c12;
        }

        .node-item .node-id {
            font-weight: bold;
            color: #4ecca3;
            font-size: 14px;
        }

        .node-item .node-scene {
            color: #aaa;
            font-size: 12px;
            margin-top: 4px;
        }

        .node-item .node-meta {
            display: flex;
            gap: 10px;
            margin-top: 6px;
            font-size: 11px;
            color: #666;
        }

        .node-item .badge {
            padding: 2px 6px;
            border-radius: 3px;
            background: #0f3460;
        }

        .node-item .badge.choice {
            background: #3498db;
        }

        .node-item .badge.ending {
            background: #f39c12;
        }

        /* 中间连接图 */
        .connection-view {
            flex: 1;
            background: #1a1a2e;
            position: relative;
            overflow: hidden;
        }

        .canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #connectionCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .canvas-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .canvas-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background: #16213e;
            color: #eee;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .canvas-btn:hover {
            background: #e94560;
        }

        /* 右侧详情面板 */
        .detail-panel {
            width: 400px;
            background: #16213e;
            border-left: 2px solid #0f3460;
            display: flex;
            flex-direction: column;
        }

        .detail-header {
            padding: 20px;
            background: #0f3460;
            border-bottom: 1px solid #1a1a2e;
        }

        .detail-header h2 {
            font-size: 18px;
            color: #4ecca3;
        }

        .detail-header .node-type {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            background: #3498db;
            color: white;
            font-size: 12px;
            margin-top: 8px;
        }

        .detail-header .node-type.ending {
            background: #f39c12;
        }

        .detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .detail-section {
            margin-bottom: 20px;
        }

        .detail-section h3 {
            font-size: 14px;
            color: #e94560;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #0f3460;
        }

        .detail-section p {
            color: #aaa;
            line-height: 1.6;
            font-size: 13px;
        }

        .detail-section .video-info {
            background: #0f3460;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            color: #4ecca3;
        }

        .detail-section .asset-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .detail-section .status-ok {
            color: #4ecca3;
        }

        .detail-section .status-missing {
            color: #e94560;
        }

        /* 选择项列表 */
        .choice-list {
            background: #0f3460;
            border-radius: 6px;
            overflow: hidden;
        }

        .choice-item {
            padding: 12px;
            border-bottom: 1px solid #1a1a2e;
        }

        .choice-item:last-child {
            border-bottom: none;
        }

        .choice-item .choice-text {
            color: #eee;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .choice-item .choice-meta {
            display: flex;
            gap: 15px;
            font-size: 11px;
            color: #666;
        }

        .choice-item .choice-next {
            color: #3498db;
        }

        .choice-item .choice-effects {
            color: #f39c12;
        }

        /* 效果详情 */
        .effects-list {
            margin-top: 8px;
            padding-left: 10px;
            border-left: 2px solid #f39c12;
        }

        .effect-item {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 4px;
        }

        .effect-item .effect-type {
            color: #f39c12;
            font-weight: bold;
        }

        /* 对话脚本 */
        .script-content {
            max-height: 400px;
            overflow-y: auto;
            background: #0f3460;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.8;
            white-space: pre-wrap;
            color: #ccc;
        }

        /* 字幕列表 */
        .subtitles-list {
            max-height: 300px;
            overflow-y: auto;
            background: #0f3460;
            border-radius: 4px;
        }

        .subtitle-item {
            padding: 8px 12px;
            border-bottom: 1px solid #1a1a2e;
            font-size: 12px;
            line-height: 1.5;
        }

        .subtitle-item:last-child {
            border-bottom: none;
        }

        .sub-time {
            color: #4ecca3;
            font-family: monospace;
            font-size: 11px;
        }

        .subtitle-more {
            padding: 8px 12px;
            color: #666;
            font-size: 11px;
            text-align: center;
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #0f3460;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #e94560;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
            text-align: center;
            padding: 40px;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <header>
        <h1>📖 剧情节点查看器</h1>
        <div class="header-info">
            <span>总节点: <strong id="totalNodes">0</strong></span>
            <span>有视频: <strong id="videoNodes">0</strong></span>
            <span>有选择: <strong id="choiceNodes">0</strong></span>
            <span>结局: <strong id="endingNodes">0</strong></span>
        </div>
    </header>

    <div class="main-container">
        <!-- 左侧节点列表 -->
        <div class="node-list">
            <div class="list-header">
                <h2>节点列表</h2>
                <input type="text" class="search-box" placeholder="搜索节点ID或场景名..." id="searchBox">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="choice">选择</button>
                    <button class="filter-btn" data-filter="ending">结局</button>
                    <button class="filter-btn" data-filter="video">有视频</button>
                    <button class="filter-btn" data-filter="broken">断链</button>
                </div>
            </div>
            <div class="node-items" id="nodeList">
                <!-- 节点列表 -->
            </div>
        </div>

        <!-- 中间连接图 -->
        <div class="connection-view">
            <div class="canvas-container">
                <canvas id="connectionCanvas"></canvas>
            </div>
            <div class="canvas-controls">
                <button class="canvas-btn" onclick="resetZoom()">🔄 重置视图</button>
                <button class="canvas-btn" onclick="toggleLabels()">🔤 切换标签</button>
            </div>
        </div>

        <!-- 右侧详情面板 -->
        <div class="detail-panel">
            <div class="detail-header">
                <h2 id="detailTitle">节点详情</h2>
                <span class="node-type" id="detailType">选择节点</span>
            </div>
            <div class="detail-content" id="detailContent">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                    </svg>
                    <p>点击左侧节点查看详情</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局数据
        let chapterData = null;
        let nodes = {};
        let filteredNodes = [];
        let selectedNodeId = null;
        let currentFilter = 'all';
        let searchText = '';

        // Canvas 状态
        let canvas, ctx;
        let zoom = 1;
        let panX = 0, panY = 0;
        let showLabels = true;
        let nodePositions = {};
        let scriptContents = {};  // 对话脚本内容
        let isDragging = false;
        let lastX = 0, lastY = 0;
        let dragStartX = 0, dragStartY = 0;

        // 初始化
        async function init() {
            const success = await loadData();
            if (!success) {
                console.error('数据加载失败');
                return;
            }
            await loadScriptContents();
            initCanvas();
            setupEventListeners();
            renderNodeList();
            drawConnectionGraph();
            updateStats();
        }

        // 加载对话脚本
        async function loadScriptContents() {
            const scriptMap = {
                'ch1_sc_001': 'ch1_sc_001.md',
                'ch1_sc_002a': 'ch1_sc_002a.md',
                'ch1_sc_002b': 'ch1_sc_002b.md',
                'ch1_sc_002c': 'ch1_sc_002c.md',
                'ch1_sc_003': 'ch1_sc_003.md',
                'ch1_sc_004': 'ch1_sc_004.md',
                'ch1_sc_005': 'ch1_sc_005.md',
                'ch1_sc_005b': 'ch1_sc_005b.md',
                'ch1_sc_006': 'ch1_sc_006.md',
                'ch1_sc_006b': 'ch1_sc_006b.md',
                'ch1_sc_007': 'ch1_sc_007.md',
                'ch1_sc_007b': 'ch1_sc_007b.md',
                'ch1_sc_008': 'ch1_sc_008.md',
                'ch1_ending_01': 'ch1_ending_01.md',
                'ch1_ending_02': 'ch1_ending_02.md',
                'ch1_ending_03': 'ch1_ending_03.md',
                'ch1_ending_04': 'ch1_ending_04.md',
                'ch1_ending_05': 'ch1_ending_05.md'
            };

            for (const [nodeId, filename] of Object.entries(scriptMap)) {
                try {
                    const response = await fetch(`../../../docs/03_art/scripts/ch1/${filename}`);
                    if (response.ok) {
                        scriptContents[nodeId] = await response.text();
                    }
                } catch (e) {
                    // 忽略加载失败
                }
            }
        }

        // 加载数据
        async function loadData() {
            // 从项目根目录加载数据
            const dataPath = '../../../lost-choices/data/stories/chapter_01_hybrid.json';
            try {
                const response = await fetch(dataPath);
                if (!response.ok) throw new Error('HTTP ' + response.status);
                chapterData = await response.json();
                nodes = chapterData.nodes || {};
            } catch (e) {
                console.error('加载数据失败:', e);
                // 显示错误信息
                document.getElementById('nodeList').innerHTML = `
                    <div style="padding: 20px; color: #e94560;">
                        <p>加载数据失败!</p>
                        <p style="font-size: 12px; color: #666; margin-top: 10px;">
                            路径: ${dataPath}<br>
                            请确保在项目根目录运行 HTTP 服务器：<br>
                            <code>cd E:\\workSpace\\ai\\task-game<br>python -m http.server 8080</code><br>
                            然后访问 <a href="http://localhost:8080" style="color: #4ecca3;">http://localhost:8080</a>
                        </p>
                    </div>
                `;
                return false;
            }
            return true;
        }

        // 设置事件监听
        function setupEventListeners() {
            // 搜索框
            document.getElementById('searchBox').addEventListener('input', (e) => {
                searchText = e.target.value.toLowerCase();
                renderNodeList();
            });

            // 过滤按钮
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderNodeList();
                });
            });

            // Canvas 鼠标事件
            canvas.addEventListener('mousedown', handleCanvasMouseDown);
            canvas.addEventListener('mousemove', handleCanvasMouseMove);
            canvas.addEventListener('mouseup', handleCanvasMouseUp);
            canvas.addEventListener('wheel', handleCanvasWheel);

            // 窗口大小改变
            window.addEventListener('resize', () => {
                initCanvas();
                drawConnectionGraph();
            });
        }

        // 渲染节点列表
        function renderNodeList() {
            const list = document.getElementById('nodeList');
            list.innerHTML = '';

            // 过滤节点
            filteredNodes = Object.entries(nodes).filter(([id, data]) => {
                // 搜索过滤
                if (searchText) {
                    const matchId = id.toLowerCase().includes(searchText);
                    const matchScene = (data.scene || '').toLowerCase().includes(searchText);
                    const matchDesc = (data.description || '').toLowerCase().includes(searchText);
                    if (!matchId && !matchScene && !matchDesc) return false;
                }

                // 类型过滤
                switch (currentFilter) {
                    case 'choice':
                        return data.node_type === 'choice';
                    case 'ending':
                        return data.node_type === 'ending';
                    case 'video':
                        return data.video && data.video.path;
                    case 'broken':
                        return isBrokenLink(id);
                    default:
                        return true;
                }
            });

            filteredNodes.forEach(([id, data]) => {
                const item = document.createElement('div');
                item.className = `node-item ${data.node_type === 'ending' ? 'ending' : ''} ${id === selectedNodeId ? 'selected' : ''}`;
                item.onclick = () => selectNode(id);

                const hasVideo = data.video && data.video.path;
                const choiceCount = data.choices ? data.choices.length : 0;

                item.innerHTML = `
                    <div class="node-id">${id}</div>
                    <div class="node-scene">${data.scene || '-'}</div>
                    <div class="node-meta">
                        <span class="badge ${data.node_type}">${data.node_type}</span>
                        ${hasVideo ? '<span class="badge">📹</span>' : ''}
                        ${choiceCount > 0 ? `<span>${choiceCount}选择</span>` : ''}
                    </div>
                `;
                list.appendChild(item);
            });
        }

        // 检查断链
        function isBrokenLink(nodeId) {
            const node = nodes[nodeId];
            if (!node || !node.choices) return false;
            return node.choices.some(c => c.next_node && !nodes[c.next_node]);
        }

        // 选择节点
        function selectNode(nodeId) {
            selectedNodeId = nodeId;
            renderNodeList();
            drawConnectionGraph();
            renderDetail(nodeId);
        }

        // 渲染详情面板
        function renderDetail(nodeId) {
            const data = nodes[nodeId];
            if (!data) return;

            document.getElementById('detailTitle').textContent = nodeId;
            const typeEl = document.getElementById('detailType');
            typeEl.textContent = data.node_type === 'ending' ? '结局' : '选择节点';
            typeEl.className = `node-type ${data.node_type === 'ending' ? 'ending' : ''}`;

            const content = document.getElementById('detailContent');

            let html = `
                <div class="detail-section">
                    <h3>场景</h3>
                    <p>${data.scene || '无'}</p>
                </div>

                <div class="detail-section">
                    <h3>描述</h3>
                    <p>${data.description || '无'}</p>
                </div>
            `;

            // 视频信息
            if (data.video) {
                html += `
                    <div class="detail-section">
                        <h3>视频</h3>
                        <div class="video-info">${data.video.path || '无'}</div>
                        <div class="asset-status">
                            <span>时长: ${data.video.duration || '?'}秒</span>
                        </div>
                    </div>
                `;
            }

            // 关键帧信息
            if (data.keyframes && data.keyframes.frames) {
                html += `
                    <div class="detail-section">
                        <h3>关键帧</h3>
                        <p>${data.keyframes.frames.length} 张</p>
                    </div>
                `;
            }

            // 选择项
            if (data.choices && data.choices.length > 0) {
                html += `
                    <div class="detail-section">
                        <h3>选择项 (${data.choices.length}个)</h3>
                        <div class="choice-list">
                `;

                data.choices.forEach((choice, i) => {
                    const effects = choice.effects || [];
                    const effectsHtml = effects.length > 0
                        ? `<div class="effects-list">${effects.map(e => `<div class="effect-item"><span class="effect-type">${e.type}</span>: ${JSON.stringify(e)}</div>`).join('')}</div>`
                        : '';

                    html += `
                        <div class="choice-item">
                            <div class="choice-text">${i + 1}. ${choice.text}</div>
                            <div class="choice-meta">
                                <span class="choice-next">→ ${choice.next_node || '无'}</span>
                                <span class="choice-effects">${effects.length}个效果</span>
                            </div>
                            ${effectsHtml}
                        </div>
                    `;
                });

                html += `</div></div>`;
            }

            // 结局信息
            if (data.node_type === 'ending') {
                html += `
                    <div class="detail-section">
                        <h3>结局信息</h3>
                        <p>${data.ending_name || ''}</p>
                        <p>${data.ending_description || ''}</p>
                    </div>
                `;
            }

            // 对话脚本
            const scriptContent = scriptContents[nodeId];
            if (scriptContent) {
                // 处理Markdown为HTML
                let scriptHtml = scriptContent
                    .replace(/^# .+$/gm, '')  // 移除标题
                    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')  // 加粗
                    .replace(/\*(.+?)\*/g, '<em>$1</em>')  // 斜体
                    .replace(/\[(.+?)\]/g, '<span style="color:#4ecca3">$1</span>')  // 角色名
                    .replace(/\n/g, '<br>');  // 换行

                html += `
                    <div class="detail-section">
                        <h3>对话脚本</h3>
                        <div class="script-content">${scriptHtml}</div>
                    </div>
                `;
            } else {
                // 显示字幕数据
                const subtitles = data.subtitles;
                if (subtitles && subtitles.length > 0) {
                    html += `
                        <div class="detail-section">
                            <h3>字幕 (${subtitles.length}条)</h3>
                            <div class="subtitles-list">
                    `;
                    subtitles.slice(0, 10).forEach(sub => {
                        html += `<div class="subtitle-item"><span class="sub-time">[${sub.time}s]</span> ${sub.text}</div>`;
                    });
                    if (subtitles.length > 10) {
                        html += `<div class="subtitle-more">...还有 ${subtitles.length - 10} 条</div>`;
                    }
                    html += `</div></div>`;
                }
            }

            content.innerHTML = html;
        }

        // 更新统计
        function updateStats() {
            const allNodes = Object.values(nodes);
            const videoCount = allNodes.filter(n => n.video && n.video.path).length;
            const choiceCount = allNodes.filter(n => n.choices && n.choices.length > 0).length;
            const endingCount = allNodes.filter(n => n.node_type === 'ending').length;

            document.getElementById('totalNodes').textContent = allNodes.length;
            document.getElementById('videoNodes').textContent = videoCount;
            document.getElementById('choiceNodes').textContent = choiceCount;
            document.getElementById('endingNodes').textContent = endingCount;
        }

        // Canvas 初始化
        function initCanvas() {
            canvas = document.getElementById('connectionCanvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
        }

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }

        // 绘制连接图
        function drawConnectionGraph() {
            if (!ctx) return;

            const width = canvas.width;
            const height = canvas.height;

            // 清空画布
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, width, height);

            // 计算节点位置（树形布局）
            calculateNodePositions();

            ctx.save();
            ctx.translate(panX + width / 2, panY + height / 2);
            ctx.scale(zoom, zoom);
            ctx.translate(-width / 2, -height / 2);

            // 绘制连线
            drawConnections();

            // 绘制节点
            drawNodes();

            ctx.restore();
        }

        // 计算节点位置
        function calculateNodePositions() {
            const allNodeIds = Object.keys(nodes);
            const startNode = chapterData.start_node;

            // 构建节点关系图
            const inDegree = {};  // 入度
            const outEdges = {};  // 出边
            const inEdges = {};    // 入边（反向）

            allNodeIds.forEach(id => {
                inDegree[id] = 0;
                outEdges[id] = [];
                inEdges[id] = [];
            });

            allNodeIds.forEach(id => {
                const node = nodes[id];
                if (node && node.choices) {
                    node.choices.forEach(c => {
                        if (c.next_node && nodes[c.next_node]) {
                            outEdges[id].push(c.next_node);
                            inEdges[c.next_node].push(id);
                            inDegree[c.next_node]++;
                        }
                    });
                }
            });

            // 计算层级（从起点开始BFS）
            const levelMap = {};
            const visited = new Set();
            const queue = [{id: startNode, level: 0}];
            visited.add(startNode);

            while (queue.length > 0) {
                const {id, level} = queue.shift();
                levelMap[id] = level;

                const node = nodes[id];
                if (node && node.choices) {
                    node.choices.forEach(c => {
                        if (c.next_node && !visited.has(c.next_node)) {
                            visited.add(c.next_node);
                            queue.push({id: c.next_node, level: level + 1});
                        }
                    });
                }
            }

            // 未访问的节点放在最后
            allNodeIds.forEach(id => {
                if (levelMap[id] === undefined) {
                    levelMap[id] = 10;  // 默认层级
                }
            });

            // 按层级和子节点数量排序
            const levels = {};
            allNodeIds.forEach(id => {
                const level = levelMap[id];
                if (!levels[level]) levels[level] = [];
                levels[level].push(id);
            });

            // 计算位置
            const levelWidth = 180;
            const nodeHeight = 70;
            const startY = 80;
            const startX = 100;

            Object.entries(levels).forEach(([level, nodeIds]) => {
                // 按子节点数量排序，让有更多连接的节点居中
                nodeIds.sort((a, b) => outEdges[b].length - outEdges[a].length);

                const y = startY + parseInt(level) * nodeHeight;
                const totalWidth = nodeIds.length * levelWidth;
                let x = startX;

                nodeIds.forEach((id, i) => {
                    // 添加一些偏移让图形更自然
                    const offset = (i % 2) * 20;
                    nodePositions[id] = {x, y: y + offset};
                    x += levelWidth;
                });
            });
        }

        // 绘制连接线
        function drawConnections() {
            const colors = ['#3498db', '#e94560', '#4ecca3', '#f39c12', '#9b59b6'];

            // 统计每个节点的入边数量
            const edgeCount = {};
            Object.entries(nodes).forEach(([id, node]) => {
                edgeCount[id] = 0;
            });
            Object.entries(nodes).forEach(([id, node]) => {
                if (node.choices) {
                    node.choices.forEach(c => {
                        if (c.next_node && edgeCount[c.next_node] !== undefined) {
                            edgeCount[c.next_node]++;
                        }
                    });
                }
            });

            let colorIndex = 0;
            Object.entries(nodes).forEach(([id, node]) => {
                if (!node.choices) return;

                const from = nodePositions[id];
                if (!from) return;

                node.choices.forEach((choice, i) => {
                    const to = nodePositions[choice.next_node];
                    if (!to) return;

                    // 使用不同颜色区分分支
                    ctx.strokeStyle = colors[colorIndex % colors.length];
                    ctx.lineWidth = 1.5;

                    // 如果是汇聚节点（有多个入边），使用虚线
                    if (edgeCount[choice.next_node] > 1) {
                        ctx.setLineDash([4, 4]);
                    } else {
                        ctx.setLineDash([]);
                    }

                    // 绘制带弧度的连线
                    ctx.beginPath();
                    ctx.moveTo(from.x + 70, from.y);

                    // 中点控制
                    const midX = (from.x + to.x) / 2;
                    const midY = (from.y + to.y) / 2;
                    const ctrlY = from.y + 15;  // 向下弯曲

                    ctx.quadraticCurveTo(midX, ctrlY, to.x - 70, to.y);
                    ctx.stroke();

                    colorIndex++;
                });
            });

            ctx.setLineDash([]);  // 重置虚线
        }

        // 绘制节点
        function drawNodes() {
            Object.entries(nodePositions).forEach(([id, pos]) => {
                const node = nodes[id];
                const isSelected = id === selectedNodeId;
                const isEnding = node.node_type === 'ending';

                // 节点矩形
                ctx.fillStyle = isEnding ? '#f39c12' : (isSelected ? '#e94560' : '#0f3460');
                ctx.strokeStyle = isSelected ? '#4ecca3' : '#16213e';
                ctx.lineWidth = 2;

                const w = 140, h = 30;
                roundRect(ctx, pos.x - w/2, pos.y - h/2, w, h, 5);
                ctx.fill();
                ctx.stroke();

                // 节点文字
                if (showLabels) {
                    ctx.fillStyle = '#eee';
                    ctx.font = '11px Microsoft YaHei';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(id, pos.x, pos.y);
                }
            });
        }

        // 圆角矩形
        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // Canvas 鼠标事件

        function handleCanvasMouseDown(e) {
            const rect = canvas.getBoundingClientRect();
            dragStartX = (e.clientX - rect.left - panX) / zoom;
            dragStartY = (e.clientY - rect.top - panY) / zoom;
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        }

        function handleCanvasMouseMove(e) {
            if (!isDragging) return;
            panX += e.clientX - lastX;
            panY += e.clientY - lastY;
            lastX = e.clientX;
            lastY = e.clientY;
            drawConnectionGraph();
        }

        function handleCanvasMouseUp(e) {
            const rect = canvas.getBoundingClientRect();
            const clickX = (e.clientX - rect.left - panX) / zoom;
            const clickY = (e.clientY - rect.top - panY) / zoom;

            // 检查是否点击了节点
            const dx = e.clientX - lastX;
            const dy = e.clientY - lastY;
            const moved = Math.sqrt(dx*dx + dy*dy);

            // 如果移动距离很小，认为是点击
            if (moved < 5) {
                // 检测点击的节点
                for (const [id, pos] of Object.entries(nodePositions)) {
                    const w = 140, h = 30;
                    if (clickX >= pos.x - w/2 && clickX <= pos.x + w/2 &&
                        clickY >= pos.y - h/2 && clickY <= pos.y + h/2) {
                        selectNode(id);
                        break;
                    }
                }
            }
            isDragging = false;
        }

        function handleCanvasWheel(e) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            zoom = Math.max(0.3, Math.min(3, zoom * delta));
            drawConnectionGraph();
        }

        // 重置视图
        function resetZoom() {
            zoom = 1;
            panX = 0;
            panY = 0;
            drawConnectionGraph();
        }

        // 切换标签
        function toggleLabels() {
            showLabels = !showLabels;
            drawConnectionGraph();
        }

        // 启动
        init();
    </script>
</body>
</html>
