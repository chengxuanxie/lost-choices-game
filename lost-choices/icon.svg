        fill="#ffffff" text-anchor="middle">?</text>

  <!-- Small dots representing different paths -->
  <circle cx="64" cy="25" r="4" fill="#0f3460"/>
  <circle cx="103" cy="64" r="4" fill="#0f3460"/>
  <circle cx="64" cy="103" r="4" fill="#0f3460"/>
  <circle cx="25" cy="64" r="4" fill="#0f3460"/>
